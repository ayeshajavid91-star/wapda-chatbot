<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAPDA MDC Assistant | Enterprise AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-pink: #ff00cc;
            --dark-bg: #0d0d1a;
            --sidebar-bg: #050510;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: #ececec;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- SIDEBAR (History) --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.3s;
        }

        .new-chat-btn {
            padding: 20px 45px;
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            background: rgba(255,255,255,0.02);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .new-chat-btn:hover { 
            background: var(--glass); 
            border-color: var(--neon-blue);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }
        .new-chat-btn i { font-size: 24px; }
        
        .agent-btn {
            border-color: var(--neon-pink) !important;
            background: rgba(255, 0, 204, 0.05) !important;
            box-shadow: 0 0 15px rgba(255, 0, 204, 0.1);
        }
        .agent-btn:hover {
            background: rgba(255, 0, 204, 0.15) !important;
            box-shadow: 0 15px 30px rgba(255, 0, 204, 0.3) !important;
        }

        .history-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .history-item {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #aaa;
            transition: 0.2s;
        }
        .history-item:hover { background: var(--glass); color: #fff; }

        /* --- MAIN CONTENT --- */
        .main-app {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0d0d1a 100%);
        }

        .chat-header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .chat-header h1 { font-family: 'Poppins', sans-serif; font-size: 20px; color: var(--neon-blue); }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15% 100px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            scrollbar-width: thin;
        }

        /* Message Bubbles - Large like Claude/GPT */
        .message {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 40px; height: 40px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 18px;
        }
        .user-avatar { background: var(--neon-pink); color: #fff; }
        .bot-avatar { background: var(--neon-blue); color: #000; }

        .content {
            font-size: 16px;
            line-height: 1.7;
            color: #e0e0e0;
            padding-top: 5px;
        }
        .user .content { color: #fff; font-weight: 500; }

        /* --- INPUT AREA --- */
        .input-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 15% 40px;
            background: var(--dark-bg); /* Solid background to prevent overlap */
            border-top: 1px solid var(--glass-border);
            z-index: 10;
        }

        .chips {
            display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;
        }
        .chip {
            padding: 10px 18px; background: rgba(0, 242, 254, 0.05); border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 12px; font-size: 13px; color: var(--neon-blue); cursor: pointer; transition: 0.3s;
        }
        .chip:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        /* --- AUTO-SUGGESTIONS --- */
        .suggestions-portal {
            position: absolute; bottom: 100%; left: 0; width: 100%;
            background: #1a1a2e; border: 1px solid var(--neon-blue);
            border-radius: 12px; margin-bottom: 10px; max-height: 250px;
            overflow-y: auto; display: none; z-index: 5000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .suggest-item {
            padding: 14px 20px; cursor: pointer; border-bottom: 1px solid var(--glass-border);
            font-size: 14px; transition: 0.2s;
        }
        .suggest-item:hover { background: rgba(0, 242, 254, 0.1); color: var(--neon-blue); padding-left: 25px; }

        .input-box {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            align-items: flex-end;
            padding: 10px 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-box:focus-within { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); }

        textarea {
            flex: 1; background: transparent; border: none; outline: none;
            color: #fff; font-size: 17px; padding: 12px;
            resize: none; max-height: 200px; font-family: inherit;
        }

        .btn-send {
            background: var(--neon-blue); color: #000; width: 44px; height: 44px;
            border-radius: 10px; border: none; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 18px; margin-bottom: 5px;
            transition: 0.2s;
        }
        .btn-send:hover { transform: scale(1.05); }
        .btn-send:disabled { background: #333; cursor: not-allowed; }

        .footer-note { text-align: center; font-size: 11px; color: #444; margin-top: 15px; }
        .footer-note span { color: var(--neon-pink); }

        /* Welcome Overlay */
        #welcome {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.8s ease-in-out;
        }
        #welcome.hide { opacity: 0; pointer-events: none; transform: scale(1.1); }
        .welcome-logo { font-size: 80px; color: var(--neon-blue); margin-bottom: 20px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px var(--neon-blue); } to { text-shadow: 0 0 30px var(--neon-blue); } }

        .welcome-tagline {
            font-family: 'Poppins'; font-size: 42px; margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: welcomeGlitch 2s infinite;
        }

        @keyframes welcomeGlitch {
            0% { transform: skew(0); }
            5% { transform: skew(2deg); }
            10% { transform: skew(0); }
        }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue);
            animation: welcomeScan 4s linear infinite; opacity: 0.3;
        }
        @keyframes welcomeScan { from { top: 0; } to { top: 100%; } }

    </style>
</head>
<body>

    <div id="welcome">
        <div class="scan-line"></div>
        <div class="welcome-logo"><i class="fas fa-robot"></i></div>
        <h2 class="welcome-tagline">⚡ WAPDA MDC AI Assistant</h2>
        <p style="color: var(--neon-blue); letter-spacing: 2px; margin-bottom: 30px; font-weight: 300;">"Smart. Secure. AI-Powered."</p>
        <div style="display:flex; gap:30px; flex-wrap:wrap; justify-content:center; max-width: 800px;">
            <button class="new-chat-btn" onclick="initApp()">
                <i class="fas fa-terminal"></i> Initialize System
            </button>
        </div>
        <p style="margin-top:60px; font-size:14px; color:#555; letter-spacing: 2px;">Designed & Developed by <span>Ayesha Javid</span></p>
    </div>

    <div class="sidebar">
        <button class="new-chat-btn" onclick="resetChat()"><i class="fas fa-plus"></i> New Chat</button>
        <div class="history-label">Recents</div>
        <div class="history-list" id="historyList">
            <!-- History Items -->
        </div>
        <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--glass-border);">
            <div style="font-size:12px; color:#555;">MDC Assistant v3.0</div>
        </div>
    </div>

    <div class="main-app">
        <div class="chat-header">
            <h1><i class="fas fa-bolt"></i> WAPDA MDC AI</h1>
            <div style="display:flex; gap:15px;">
                <button onclick="clearAll()" style="background:transparent; border:none; color:#444; cursor:pointer;"><i class="fas fa-trash"></i></button>
            </div>
        </div>

        <div class="chat-body" id="chatBox">
            <!-- Messages -->
        </div>

        <div class="input-wrapper">
            <div class="chips">
                <div class="chip" onclick="quick('How to Read Meter')">📊 Reading</div>
                <div class="chip" onclick="quick('Illegal Connection')">🚨 Illegal</div>
                <div class="chip" onclick="quick('Faulty Meter')">⚠️ Faulty</div>
                <div class="chip" onclick="quick('Locked Premises')">🔒 Locked</div>
                <div class="chip" onclick="quick('Angry Consumer')">😠 Dispute</div>
            </div>
            <div class="input-box">
                <div class="suggestions-portal" id="suggestionsPortal"></div>
                <textarea id="userInput" placeholder="Message MDC AI Assistant..." rows="1"></textarea>
                <button class="btn-send" id="sendBtn" onclick="handleSend()"><i class="fas fa-arrow-up"></i></button>
            </div>
            <div class="footer-note">
                OFFICIAL MDC SYSTEM | POWERED BY AI | SYSTEM BY <span>AYESHA JAVID</span>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const historyList = document.getElementById('historyList');
        const suggestionsPortal = document.getElementById('suggestionsPortal');

        let isTyping = false;
        let allQuestions = [];

        function initApp() {
            document.getElementById('welcome').classList.add('hide');
            loadHistory();
            userInput.focus();
        }

        // Suggestions Logic
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';

            const val = this.value.toLowerCase().trim();
            suggestionsPortal.innerHTML = '';

            if (val.length < 1) {
                suggestionsPortal.style.display = 'none';
                return;
            }

            const matches = allQuestions.filter(q => q.toLowerCase().includes(val)).slice(0, 6);
            
            if (matches.length > 0) {
                matches.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'suggest-item';
                    div.textContent = m;
                    div.onclick = () => {
                        userInput.value = m;
                        suggestionsPortal.style.display = 'none';
                        handleSend();
                    };
                    suggestionsPortal.appendChild(div);
                });
                suggestionsPortal.style.display = 'block';
            } else {
                suggestionsPortal.style.display = 'none';
            }
        });

        // Close suggestions when clicking away
        document.addEventListener('click', (e) => {
            if (!suggestionsPortal.contains(e.target) && e.target !== userInput) {
                suggestionsPortal.style.display = 'none';
            }
        });

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || isTyping) return;

            appendMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            isTyping = true;
            
            // Save to history
            saveToStorage(text, 'user');

            // Typing indicator
            const typingMsg = appendMessage("Thinking...", 'bot');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                typingMsg.querySelector('.content').innerHTML = data.response;
                saveToStorage(data.response, 'bot');
            } catch (e) {
                typingMsg.querySelector('.content').innerHTML = "ERROR: System connection lost.";
            }

            isTyping = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar ${role === 'user' ? 'user-avatar' : 'bot-avatar'}">
                    <i class="fas ${role === 'user' ? 'fa-user' : 'fa-robot'}"></i>
                </div>
                <div class="content">${text}</div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function quick(t) { userInput.value = t; handleSend(); }

        // Storage
        function saveToStorage(content, role) {
            let history = JSON.parse(sessionStorage.getItem('mdc_v3_history')) || [];
            history.push({ content, role });
            sessionStorage.setItem('mdc_v3_history', JSON.stringify(history));
            updateHistoryUI();
        }

        function loadHistory() {
            const history = JSON.parse(sessionStorage.getItem('mdc_v3_history')) || [];
            if (history.length === 0) {
                appendMessage("Hello! I am your WAPDA MDC Assistant. How can I help you with meter data control today?", 'bot');
            } else {
                history.forEach(m => appendMessage(m.content, m.role));
            }
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const history = JSON.parse(sessionStorage.getItem('mdc_v3_history')) || [];
            historyList.innerHTML = '';
            // Only show unique user questions in history list
            const userQueries = history.filter(m => m.role === 'user');
            [...new Set(userQueries.map(m => m.content))].reverse().slice(0, 10).forEach(q => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.textContent = q;
                div.onclick = () => { userInput.value = q; handleSend(); };
                historyList.appendChild(div);
            });
        }

        function resetChat() {
            if (confirm("Start a new conversation? (Clears current screen)")) {
                chatBox.innerHTML = '';
                appendMessage("Hello! I am your WAPDA MDC Assistant. New session active. How can I help you?", 'bot');
                chatBox.scrollTop = 0;
                userInput.value = '';
                userInput.focus();
            }
        }

        function clearAll() {
            if (confirm("Clear all data?")) {
                sessionStorage.removeItem('mdc_v3_history');
                location.reload();
            }
        }

        // Load Data
        fetch('/api/questions').then(r => r.json()).then(d => { allQuestions = d; });

        userInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        }
    </script>
</body>
</html>
